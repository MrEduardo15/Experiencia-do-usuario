<!DOCTYPE html>
<html lang="pt-br">
<head>

<body>
    <header class="perfil-header">
        <div class="header-linha-topo">

             <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#10BE00">

      </div>

            <span class="titulo-gasto">Supermercado</span>

    <button class="fab-adicionar-gasto" onclick="window.location.href='gasto-form.html'">
