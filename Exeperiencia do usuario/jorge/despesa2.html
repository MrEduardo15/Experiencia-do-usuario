<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Gasto - Gestão Financeira</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="perfil.css">
</head>
<body>
    <header class="perfil-header">
        <div class="header-linha-topo">
        <div class="icones-menu">
            <!-- icone para voltar -->
             <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#10BE00">
                <path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z"/>
            </svg>
        </div>
      
      <div class="boas-vindas">
        <h1>Novo Gasto</h1>
      </div>
    
      </div>
      
    </header>

   <main class="form-novo-gasto">
    <div class="campo-grupo-simples">
        <label for="nome-gasto">Nome do gasto</label>
        <input type="text" id="nome-gasto" placeholder="Ex: Supermercado" class="input-nome">
    </div>
    
    <div class="campo-grupo-vibrante">
        <label>valor gasto</label>
        <div class="input-container-gasto">
            <input type="text" placeholder="Digite valor">
        </div>
    </div>

    <div class="campo-grupo-vibrante">
        <label>data do gasto</label>
        <div class="input-container-gasto">
            <input type="text" placeholder="Digite data">
        </div>
    </div>

    <div class="campo-grupo-vibrante">
        <label>categoria</label>
        <div class="input-container-gasto">
            <select>
                <option value="" disabled selected>Escolha uma categoria</option>
                <option value="alimentacao">Alimentação</option>
                <option value="transporte">Transporte</option>
                <option value="lazer">Lazer</option>
            </select>
            
        </div>
    </div>

    <button type="submit" class="btn-salvar-gasto">
        SALVAR GASTO
    </button>
</main>
</body>
</html>
