<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Gestão Financeira</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="perfil.css">
</head>
<body>
    <header class="perfil-header">
        <div class="header-linha-topo">
        <div class="icones-menu">
            <!-- icone para voltar -->
             <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#10BE00">
                <path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z"/>
            </svg>
        </div>
        

      <div class="foto-perfil">
          <span>KA</span>
        </div>
      <div class="boas-vindas">
        <h1>Kamila</h1>
      </div>

      <div class="icones-menu">
        <!-- esta é a imagem da lupa -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#10BE00">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <!-- esta é a imagem do sino -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#10BE00">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
        <!-- esta é a imagem do balão de chat -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#10BE00">
          <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 3H6v2h8v-2zm-4 3H6v2h4v-2z"/>
        </svg>
      </div>
      </div>
    </header>

    <main>
        <div class="faixa-titulo-secao">
        EDITAR PERFIL
        </div>
        <form id="formAtualizarDados" class="form-edicao">
        <div class="campo-grupo">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" value="Kamila Dantas Luongo">
        </div>

        <div class="campo-grupo">
            <label for="nascimento">Data de Nascimento</label>
            <input type="date" id="nascimento" value="1980-12-05">
        </div>

        <div class="campo-grupo">
            <label for="email">E-mail</label>
            <input type="email" id="email" value="kamila@gmail.com">
        </div>

        <div class="campo-grupo">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" value="(11) 91845-4568">
        </div>
        <a href="perfil.html" class="btn-salvar" style="text-decoration: none; display: block; text-align: center;">
            Salvar Alterações
        </a>
        
    </form>
    </main>
</body>
</html>
