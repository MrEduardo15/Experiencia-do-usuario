<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrato - Gestão Financeira</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="perfil.css">
</head>
<body>
    <header class="perfil-header">
        <div class="header-linha-topo">
        <div class="icones-menu">
            <!-- icone para voltar -->
             <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#10BE00">
                <path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z"/>
            </svg>
        </div>
        
      <div class="boas-vindas">
        <h1>Extrato</h1>
      </div>

      </div>
      
    </header>
    
    <main class="container-extrato">
        <div class="data-grupo">Hoje, 03 de Maio</div>

        <div class="card-transacao">
            <div class="info-transacao">
                <span class="titulo-transacao">Supermercado Silva</span>
                <span class="categoria-transacao">Alimentação</span>
            </div>
            <div class="valor-transacao saida">- R$ 150,00</div>
        </div>

        <div class="card-transacao">
            <div class="info-transacao">
                <span class="titulo-transacao">Transferência Recebida</span>
                <span class="categoria-transacao">Pix</span>
            </div>
            <div class="valor-transacao entrada">+ R$ 450,00</div>
        </div>

        <div class="data-grupo">Ontem, 02 de Maio</div>

        <div class="card-transacao">
            <div class="info-transacao">
                <span class="titulo-transacao">Posto de Gasolina</span>
                <span class="categoria-transacao">Transporte</span>
            </div>
            <div class="valor-transacao saida">- R$ 220,00</div>
        </div>
    </main>

</body>
</html>
