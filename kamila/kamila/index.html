<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Principal - Gestão Financeira</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="perfil-header">
      <a href="perfil.html" style="text-decoration: none;">
        <div class="foto-perfil">
          <span>KA</span>
        </div>
      </a>
      <div class="boas-vindas">
        <h1>Kamila</h1>
        <p>Olá, que bom te ver por aqui!</p>
      </div>
      <div class="icones-menu">
        <!-- esta é a imagem da lupa -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#10BE00">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <!-- esta é a imagem do sino -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#10BE00">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
        <!-- esta é a imagem do balão de chat -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#10BE00">
          <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 3H6v2h8v-2zm-4 3H6v2h4v-2z"/>
        </svg>
      </div>
    </header>

    <main>
      <section class="secao-saldo">
        <h2 class="titulo-saldo">Saldo</h2>
        <p class="valor-saldo">R$ 00,00</p>
      </section>

      <a href="extrato.html" class="link-extrato">
        <span>Extrato</span>
        <span class="seta">></span>
      </a>
      
      <section class="card-fluxo">
        <h3>Fluxo de caixa</h3>
        
        <div class="container-grafico">
            [Gráfico aqui]
        </div>
    
        <div class="legenda">
            <span><i class="dot-despesa"></i> Despesas</span>
            <span><i class="dot-receita"></i> Receitas</span>
        </div>
    </section>

    <section class="container-cards">
      <div class="card-fluxo">
          <h3>Receita</h3>
          <p class="valor-card">R$ 00,00</p>
      </div>
      <div class="card-fluxo">
          <h3>Despesas</h3>
          <p class="valor-card">R$ 00,00</p>
      </div>
      <div class="card-fluxo">
          <h3>Investimentos</h3>
          <p class="valor-card">R$ 00,00</p>
      </div>
      <div class="card-fluxo card-mais">
        <h3>Mais</h3>
        <p class="simbolo-mais">+</p>
    </div>
  </section>
  <button class="botao-configuracoes">
    configurações
  </button>
    <script src="script.js"></script>
  </body>
</html>
