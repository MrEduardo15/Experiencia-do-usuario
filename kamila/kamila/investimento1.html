<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investimento - Gestão Financeira</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="perfil.css">
</head>
<body>
    <header class="perfil-header">
        <div class="header-linha-topo">
        <div class="icones-menu">
            <!-- icone para voltar -->
             <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#10BE00">
                <path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z"/>
            </svg>
        </div>
      
      <div class="boas-vindas">
        <h1>Investimento</h1>
      </div>
    
      </div>
      
    </header>
    <main class="container-investimentos">
    <div class="card-resumo-investimento">
        <span class="label-investimento">investimento total</span>
        <h2 class="valor-investimento">R$15.200,00</h2>
    </div>

    <div class="data-grupo">Meus Ativos</div>

    <div class="card-investimento">
        <div class="info-investimento">
            <span class="titulo-investimento">Tesouro Direto 2029</span>
            <span class="categoria-investimento">Renda Fixa</span>
        </div>
        <div class="valor-investimento">R$ 5.000,00</div>
    </div>

    <div class="card-investimento">
        <div class="info-investimento">
            <span class="titulo-investimento">CDB Banco X</span>
            <span class="categoria-investimento">Renda Fixa</span>
        </div>
        <div class="valor-investimento">R$ 10.200,00</div>
    </div>

    <button class="fab-adicionar" onclick="window.location.href='investimento-form.html'">
        <svg xmlns="http://www.w3.org/2000/svg" height="32px" viewBox="0 -960 960 960" width="32px" fill="white">
            <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/>
        </svg>
    </button>
</main>
  
</body>
</html>
